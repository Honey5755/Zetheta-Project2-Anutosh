          description: Plant (ANLZ WERKS).
        fiscalYear:
          type: integer
          description: Fiscal year (ANLP GJAHR).
        accumulatedDepreciation:
          type: number
          format: double
          description: Accumulated ordinary depreciation (ANLP).
        plannedDepreciation:
          type: number
          format: double
          description: Planned depreciation for the year (ANLP).
        netBookValue:
          type: number
          format: double
          description: Net book value.
        currencyLC:
          type: string
          description: Local currency ISO code.
    FixedAssetCollection:
      allOf:
        - $ref: '#/components/schemas/CollectionMeta'
        - type: object
          properties:
            value:
              type: array
              items:
                $ref: '#/components/schemas/FixedAsset'
    BankStatement:
      type: object
      description: Electronic bank statement header (FEBKO) and line item (FEBEP).
      required:
        - statementId
        - statementLineNumber
        - companyCode
      properties:
        statementId:
          type: string
          description: Bank statement number (FEBKO).
        statementLineNumber:
          type: integer
          description: Statement line item number (FEBEP).
        companyCode:
          type: string
          enum:
            - MC01
            - MC02
            - MC03
        houseBankAccount:
          type: string
          description: House bank account identifier (FEBKO KONTS).
        glAccount:
          type: string
          description: Posted G/L account.
        fiscalYear:
          type: integer
          description: Fiscal year.
        amount:
          type: number
          format: double
          description: Line item amount (FEBEP KWBTR).
        currency:
          type: string
          description: Statement currency ISO code.
        valueDate:
          type: string
          format: date
          description: Value date (FEBEP VALUT).
        transactionType:
          type: string
          description: External transaction type / business transaction code.
        documentReference:
          type: string
          description: Reference document number (FEBEP VBLNR).
        postingStatus:
          type: string
          description: Posting status of the statement line.
          enum:
            - POSTED
            - PARKED
            - UNPOSTED
    BankStatementCollection:
      allOf:
        - $ref: '#/components/schemas/CollectionMeta'
        - type: object
          properties:
            value:
              type: array
              items:
                $ref: '#/components/schemas/BankStatement'
    BudgetActual:
      type: object
      description: CO plan/actual totals (COSP external, COSS internal).
      required:
        - objectId
        - fiscalYear
        - valueType
      properties:
        objectId:
          type: string
          description: CO object number (COSP/COSS OBJNR).
        controllingArea:
          type: string
          description: Controlling area.
        companyCode:
          type: string
          enum:
            - MC01
            - MC02
            - MC03
        costCentre:
          type: string
          description: Cost centre derived from the CO object.
        costElement:
          type: string
          description: Cost element / account (COSP KSTAR).
        fiscalYear:
          type: integer
          description: Fiscal year (COSP GJAHR).
        fiscalPeriod:
          type: integer
          description: Fiscal period 1-16.
        valueType:
          type: string
          description: Value type derived from WRTTP (ACTUAL=04, PLAN=01).
          enum:
            - ACTUAL
            - PLAN
        version:
          type: string
          description: Plan/actual version (COSP VERSN).
        amount:
          type: number
          format: double
          description: Period amount (COSP WKG001-WKG016 for the period).
        currency:
          type: string
          description: Controlling area currency ISO code.
        budgetAmount:
          type: number
          format: double
          description: Corresponding plan amount for variance analysis.
        variance:
          type: number
          format: double
          description: Actual minus budget.
    BudgetActualCollection:
      allOf:
        - $ref: '#/components/schemas/CollectionMeta'
        - type: object
          properties:
            value:
              type: array
              items:
                $ref: '#/components/schemas/BudgetActual'
    Inventory:
