openapi: 3.0.3
info:
  title: Meridian SAP S/4HANA Source Extraction API
  version: 1.0.0
  description: >
    OData v2 source-extraction contract for the FDE-9B integration between
    Meridian Manufacturing Ltd. SAP S/4HANA (2023 FPS02, system PRD client 100)
    and Zetheta FinSight 4.2.


    This specification exposes the twelve delta-capable source endpoints
    (SRC-001 through SRC-012) consumed by the ODP Extractor component. Each
    endpoint is a read-only OData collection surfaced through the SAP Gateway
    and backed by ABAP CDS consumption views over the underlying SAP tables.


    ## Extraction model

    * **Delta tracking** — Every collection supports ODP delta extraction. The
      caller passes the `deltaToken` returned by the previous successful call.
      When the token is omitted the endpoint performs a full initialisation
      load. The delta token is only advanced on a successful HTTP 200, so a
      failed extraction is safely re-driven with no data loss.

    * **Pagination** — Server-side paging follows OData conventions using
      `$top` and `$skip`. Responses carry `@odata.count` and, when more data is
      available, an `@odata.nextLink` continuation cursor.

    * **Multi-company routing** — The `companyCode` filter scopes an extraction
      to one of the canonical SAP company codes (`MC01`, `MC02`, `MC03`) which
      the downstream Transformation Engine maps to the matching FinSight tenant.

    * **Governor limits** — Extraction respects the Basis-imposed limit of one
      ODP delta per provider per 30 minutes and a pool of no more than 50
      concurrent RFC connections. Rate-limit state is returned on every response
      via the `X-RateLimit-*` headers.


    ## Security

    Access is protected by mutual TLS. Callers present an X.509 client
    certificate issued by the Meridian internal CA at the SAP Gateway reverse
    proxy, and additionally supply an OAuth 2.0 bearer token (SAP OAuth 2.0
    server, `client_credentials` grant) **or** a gateway API key. The client
    certificate binds the OAuth client to a registered technical user
    (`ZFINSIGHT_EXTRACT`) subject to SAP authorisation object checks.
  contact:
    name: Meridian Integration Platform Team
    email: integration-platform@meridian-mfg.example.com
  license:
    name: Proprietary - Meridian Manufacturing Ltd.
    url: https://meridian-mfg.example.com/legal/api-terms
  termsOfService: https://meridian-mfg.example.com/legal/api-terms
servers:
  - url: https://sap-gw.meridian-mfg.example.com/sap/odata/v2
    description: SAP S/4HANA production gateway (PRD, client 100)
  - url: https://sap-gw-qas.meridian-mfg.example.com/sap/odata/v2
    description: SAP S/4HANA quality system (QAS)
tags:
  - name: General Ledger
    description: Universal Journal line items (SRC-001, ACDOCA / BKPF / BSEG).
  - name: Accounts Payable
    description: Vendor open items and vendor master (SRC-002, BSIK / LFA1 / LFC1).
  - name: Accounts Receivable
    description: Customer open items and customer master (SRC-003, BSID / KNA1 / KNC1).
  - name: Cost Centre Accounting
    description: Cost centre master and CO totals (SRC-004, CSKS / CSKT / COSS).
  - name: Profit Centre Accounting
    description: Profit centre master data (SRC-005, CEPC / CEPCT).
  - name: Material Ledger
    description: Material valuation and actual costing (SRC-006, MBEW / COSP).
  - name: Purchase Orders
    description: Purchasing documents (SRC-007, EKKO / EKPO / EKET).
  - name: Sales Orders
    description: Sales documents (SRC-008, VBAK / VBAP / VBEP).
  - name: Fixed Assets
    description: Asset master and periodic values (SRC-009, ANLA / ANLZ / ANLP).
  - name: Bank Statements
    description: Electronic bank statement postings (SRC-010, FEBKO / FEBEP).
  - name: Budget Actual
    description: CO plan/actual totals (SRC-011, COSP / COSS).
  - name: Inventory
    description: Storage location stock and valuation (SRC-012, MARD / MBEW).
security:
  - sapOAuth2: []
  - sapApiKey: []
paths:
  /journal-entries:
    get:
      operationId: getJournalEntries
      summary: Extract General Ledger journal entries (SRC-001)
      description: >
        Delta extraction of Universal Journal line items from CDS view
        `I_JournalEntryItem` over ACDOCA (with header context from BKPF and
        segment detail from BSEG). Freshness target 30 minutes via ODP delta.
      tags:
        - General Ledger
      parameters:
        - $ref: '#/components/parameters/CompanyCode'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/DeltaToken'
        - $ref: '#/components/parameters/FiscalYear'
        - $ref: '#/components/parameters/PostingDateFrom'
      responses:
        '200':
          description: Journal entry page returned.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryCollection'
              example:
                '@odata.context': $metadata#JournalEntries
                '@odata.count': 4821
                '@odata.deltaToken': 'D20260707T093000_000123'
                '@odata.nextLink': /journal-entries?$skip=100&deltaToken=D20260707T093000_000123
                value:
                  - documentId: MC01-2026-0100004821
                    companyCode: MC01
                    fiscalYear: 2026
                    documentNumber: '0100004821'
                    lineItem: 1
                    ledger: '0L'
                    glAccount: '0000400000'
                    documentType: SA
                    postingDate: '2026-07-07'
                    documentDate: '2026-07-06'
                    fiscalPeriod: 4
                    amountLC: 152340.75
                    currencyLC: INR
                    amountTC: 152340.75
                    currencyTC: INR
                    debitCreditIndicator: S
                    costCentre: '0000MC01IT'
                    profitCentre: 'PC-PL01'
                    userName: RGGBS_BTCH
                    transactionCode: FB50
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /payables:
