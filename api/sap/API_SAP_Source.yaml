          type: string
          enum:
            - MC01
            - MC02
            - MC03
        unrestrictedStock:
          type: number
          format: double
          description: Unrestricted-use stock (MARD LABST).
        qualityInspectionStock:
          type: number
          format: double
          description: Stock in quality inspection (MARD INSME).
        blockedStock:
          type: number
          format: double
          description: Blocked stock (MARD SPEME).
        returnsStock:
          type: number
          format: double
