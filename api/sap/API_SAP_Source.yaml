                '@odata.context': $metadata#BudgetActuals
                '@odata.count': 640
                '@odata.deltaToken': 'D20260707T020000_000031'
                value:
                  - objectId: 'KS0000MC01IT'
                    controllingArea: '1000'
                    companyCode: MC01
                    costCentre: '0000MC01IT'
                    costElement: '0000400000'
                    fiscalYear: 2026
                    fiscalPeriod: 4
                    valueType: ACTUAL
                    version: '000'
                    amount: 152340.75
                    currency: INR
                    budgetAmount: 200000.00
                    variance: -47659.25
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /inventory:
    get:
      operationId: getInventory
      summary: Extract Inventory stock (SRC-012)
      description: >
        Delta extraction of storage-location stock (MARD) with valuation from
        MBEW. Freshness target 60 minutes. Downstream this folds into Material
        Ledger analytics.
      tags:
        - Inventory
      parameters:
        - $ref: '#/components/parameters/CompanyCode'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/DeltaToken'
        - $ref: '#/components/parameters/Plant'
      responses:
        '200':
          description: Inventory page returned.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryCollection'
              example:
                '@odata.context': $metadata#Inventory
                '@odata.count': 2044
                '@odata.deltaToken': 'D20260707T090000_000410'
                value:
                  - materialId: '000000000000102345'
                    plant: PL01
                    storageLocation: '0001'
                    companyCode: MC01
                    unrestrictedStock: 8400.000
                    qualityInspectionStock: 200.000
                    blockedStock: 0.000
                    returnsStock: 50.000
                    baseUnit: EA
                    valuationPrice: 145.50
                    stockValue: 1222200.00
                    currencyLC: INR
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    sapOAuth2:
      type: oauth2
      description: >
        SAP OAuth 2.0 authorization server (`client_credentials` grant) bound
        to the technical user ZFINSIGHT_EXTRACT. Presented alongside an X.509
        mutual-TLS client certificate at the SAP Gateway; the certificate and
        token are cross-validated before SAP authorisation object checks run.
      flows:
        clientCredentials:
          tokenUrl: https://sap-gw.meridian-mfg.example.com/sap/bc/sec/oauth2/token
          scopes:
            odata.read: Read access to SAP OData source collections
    sapApiKey:
      type: apiKey
      description: >
        Gateway API key issued per registered consumer. Used in place of the
        OAuth bearer token for machine-to-machine calls that still present the
        mandatory X.509 client certificate at the mutual-TLS terminating proxy.
      in: header
      name: APIKey
  parameters:
    CompanyCode:
      name: companyCode
      in: query
      required: false
      description: >
        Canonical SAP company code filter. One of MC01, MC02 or MC03. When
        omitted, all authorised company codes for the technical user are
        returned.
      schema:
        type: string
        enum:
          - MC01
          - MC02
          - MC03
      example: MC01
    Top:
      name: $top
      in: query
      required: false
      description: Maximum number of records to return in this page (OData $top).
      schema:
        type: integer
        minimum: 1
        maximum: 5000
        default: 1000
      example: 1000
    Skip:
      name: $skip
      in: query
      required: false
      description: Number of records to skip for offset-based paging (OData $skip).
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0
    DeltaToken:
      name: deltaToken
      in: query
      required: false
      description: >
        ODP delta token returned by the previous successful extraction. Omit
        to run a full initialisation load. The token is only advanced on a
        successful HTTP 200 so failed extractions are safely re-driven.
      schema:
        type: string
        pattern: '^D[0-9]{8}T[0-9]{6}_[0-9]{6}$'
      example: D20260707T093000_000123
    FiscalYear:
      name: fiscalYear
      in: query
      required: false
      description: Fiscal year filter (SAP variant V3, April-March).
      schema:
        type: integer
        minimum: 2000
        maximum: 2099
      example: 2026
    PostingDateFrom:
      name: postingDateFrom
      in: query
      required: false
      description: Lower bound (inclusive) for posting date, ISO 8601 date.
      schema:
        type: string
        format: date
      example: '2026-07-01'
    ControllingArea:
      name: controllingArea
      in: query
      required: false
      description: SAP controlling area filter (KOKRS).
      schema:
        type: string
      example: '1000'
    Plant:
      name: plant
      in: query
      required: false
      description: Plant filter (WERKS). One of PL01 through PL07.
      schema:
        type: string
        enum:
          - PL01
          - PL02
          - PL03
          - PL04
          - PL05
          - PL06
          - PL07
      example: PL01
  headers:
    XRateLimitLimit:
      description: Maximum number of extraction requests permitted in the current window.
      schema:
        type: integer
      example: 48
    XRateLimitRemaining:
      description: Remaining requests in the current window.
      schema:
        type: integer
      example: 47
    XRateLimitReset:
      description: Unix epoch seconds at which the rate-limit window resets.
      schema:
        type: integer
      example: 1751880600
    RetryAfter:
      description: Seconds the client should wait before retrying.
      schema:
        type: integer
      example: 1800
  responses:
    BadRequest:
      description: Malformed request - invalid parameter, filter or delta token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OdataError'
          example:
            error:
              code: SY/530
              message: Invalid deltaToken format.
              target: deltaToken
    Unauthorized:
      description: Missing or invalid OAuth token, API key or client certificate.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OdataError'
          example:
            error:
              code: SY/401
              message: OAuth token expired or client certificate not presented.
    Forbidden:
      description: Authenticated user lacks SAP authorisation for the requested company code.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OdataError'
          example:
            error:
              code: SY/403
              message: Authorisation object F_BKPF_BUK check failed for company code MC02.
              target: companyCode
    TooManyRequests:
      description: >
        ODP frequency governor exceeded (max one delta per provider per 30
        minutes) or RFC pool exhausted.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
        X-RateLimit-Limit:
          $ref: '#/components/headers/XRateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/XRateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/XRateLimitReset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OdataError'
          example:
            error:
              code: SY/429
              message: ODP delta frequency limit reached for provider ZFI_JE. Retry after window.
    InternalError:
      description: SAP Gateway or backend processing error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OdataError'
          example:
            error:
              code: SY/500
              message: Backend short dump during CDS view execution.
  schemas:
    OdataError:
      type: object
      description: OData v2 error envelope returned by the SAP Gateway.
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: SAP message class and number.
            message:
              type: string
              description: Human-readable error text.
            target:
              type: string
              description: Offending parameter or field, when applicable.
    CollectionMeta:
      type: object
      description: Shared OData collection envelope metadata.
      properties:
        '@odata.context':
          type: string
          description: Metadata context URL for the returned entity set.
        '@odata.count':
          type: integer
          description: Total number of records matching the query.
        '@odata.deltaToken':
          type: string
          description: Delta token to pass on the next extraction to receive only changes.
        '@odata.nextLink':
          type: string
          description: Continuation cursor URL when more records are available.
    JournalEntry:
      type: object
      description: Universal Journal line item (ACDOCA with BKPF/BSEG context).
      required:
        - documentId
        - companyCode
        - fiscalYear
        - glAccount
        - amountLC
        - postingDate
      properties:
        documentId:
          type: string
          description: Composite business key CONCAT(companyCode, fiscalYear, documentNumber). Maps to ACDOCA RBUKRS/GJAHR/BELNR.
        companyCode:
          type: string
          description: SAP company code (ACDOCA RBUKRS).
          enum:
            - MC01
            - MC02
            - MC03
        fiscalYear:
          type: integer
          description: Fiscal year (ACDOCA GJAHR).
        documentNumber:
          type: string
          description: Accounting document number (ACDOCA BELNR).
        lineItem:
          type: integer
          description: Document line item (ACDOCA BUZEI).
        ledger:
          type: string
          description: Ledger (ACDOCA RLDNR); 0L is the leading ledger.
        glAccount:
          type: string
          description: G/L account (ACDOCA RACCT).
        documentType:
          type: string
          description: Document type (BKPF BLART).
        postingDate:
          type: string
          format: date
          description: Posting date (BKPF BUDAT).
        documentDate:
          type: string
          format: date
          description: Document date (BKPF BLDAT).
        fiscalPeriod:
          type: integer
          description: Posting period 1-16 including special periods (BKPF MONAT).
        amountLC:
          type: number
          format: double
          description: Amount in local currency (ACDOCA HSL / BSEG DMBTR).
        currencyLC:
          type: string
          description: Local currency ISO code (ACDOCA RHCUR).
        amountTC:
          type: number
          format: double
          description: Amount in transaction currency (BSEG WRBTR).
        currencyTC:
          type: string
          description: Transaction currency ISO code (BSEG PSWSL).
        debitCreditIndicator:
          type: string
          description: Debit/credit indicator S=debit, H=credit (BSEG).
          enum:
            - S
            - H
        costCentre:
          type: string
          description: Cost centre (ACDOCA KOSTL).
        profitCentre:
          type: string
          description: Profit centre (ACDOCA PRCTR).
        userName:
          type: string
          description: User who posted the document (BKPF USNAM).
        transactionCode:
          type: string
          description: Transaction code used (BKPF TCODE).
    JournalEntryCollection:
      allOf:
        - $ref: '#/components/schemas/CollectionMeta'
        - type: object
          properties:
            value:
              type: array
              items:
                $ref: '#/components/schemas/JournalEntry'
