components:
  securitySchemes:
    finsightOAuth2:
      type: oauth2
      description: >
        Zetheta FinSight OAuth 2.0 authorization server, `client_credentials`
        grant. The FinSight Loader exchanges client id/secret for a 3600s
        access token plus a refresh token, refreshing on TOKEN_EXPIRED via the
        refresh_token grant. Scopes are granted per resource.
      flows:
        clientCredentials:
          tokenUrl: https://auth.finsight.zetheta.example.com/oauth2/token
          refreshUrl: https://auth.finsight.zetheta.example.com/oauth2/token
          scopes:
            finsight.read: Read access to FinSight resources
            finsight.write: Write access to FinSight resources
            finsight.journal-entries.write: Write journal entries
            finsight.payables.write: Write payables
            finsight.receivables.write: Write receivables
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        Business key of the record (for journal entries, `documentId`).
        Retained 24 hours; a repeated key with an identical payload returns the
        original result, a divergent payload returns 409 DUPLICATE_ENTRY.
      schema:
        type: string
        maxLength: 128
      example: MC01-2026-0100004821
    Tenant:
      name: X-FinSight-Tenant
      in: header
      required: true
      description: FinSight tenant identifier matching the SAP company code routing.
      schema:
        type: string
        enum:
          - MERIDIAN-MC01
          - MERIDIAN-MC02
          - MERIDIAN-MC03
      example: MERIDIAN-MC01
    CallbackUrl:
      name: X-Callback-Url
      in: header
      required: false
      description: >
        Optional HTTPS webhook URL that FinSight calls with the asynchronous
        load-confirmation event once the record is durably committed or rejected.
      schema:
        type: string
        format: uri
      example: https://loader.integration.meridian-mfg.example.com/webhooks/finsight-load
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Maximum number of records per page (cursor pagination).
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
      example: 100
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque continuation cursor returned as nextCursor in the previous page.
      schema:
        type: string
      example: eyJvZmZzZXQiOjEwMH0
    FiscalYearQuery:
      name: fiscalYear
      in: query
      required: false
      description: Filter by fiscal year.
      schema:
        type: integer
        minimum: 2000
        maximum: 2099
      example: 2026
  headers:
    XRateLimitLimit:
      description: Maximum requests permitted in the current window.
      schema:
        type: integer
      example: 600
    XRateLimitRemaining:
      description: Remaining requests in the current window.
      schema:
        type: integer
      example: 598
    XRateLimitReset:
      description: Unix epoch seconds at which the rate-limit window resets.
      schema:
        type: integer
      example: 1751880600
    RetryAfter:
      description: Seconds the client should wait before retrying.
      schema:
        type: integer
      example: 30
    Location:
      description: Canonical URL of the created resource.
      schema:
        type: string
        format: uri
      example: https://api.finsight.zetheta.example.com/api/v2/journal-entries/MC01-2026-0100004821
  responses:
    JournalEntryCreated:
      description: Journal entry accepted and queued for durable commit.
      headers:
        Location:
          $ref: '#/components/headers/Location'
        X-RateLimit-Limit:
          $ref: '#/components/headers/XRateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/XRateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/XRateLimitReset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecordAck'
          example:
            recordId: MC01-2026-0100004821
            tenantId: MERIDIAN-MC01
            status: ACCEPTED
            createdAt: '2026-07-07T09:30:12Z'
    JournalEntryIdempotentReplay:
      description: Idempotent replay - identical payload already processed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecordAck'
          example:
            recordId: MC01-2026-0100004821
            tenantId: MERIDIAN-MC01
            status: COMMITTED
            createdAt: '2026-07-07T09:30:12Z'
    RecordCreated:
      description: Record accepted and queued for durable commit.
      headers:
        Location:
          $ref: '#/components/headers/Location'
        X-RateLimit-Limit:
          $ref: '#/components/headers/XRateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/XRateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/XRateLimitReset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecordAck'
          example:
            recordId: MC01-2026-1900002011
            tenantId: MERIDIAN-MC01
            status: ACCEPTED
            createdAt: '2026-07-07T09:31:02Z'
    RecordIdempotentReplay:
      description: Idempotent replay - identical payload already processed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecordAck'
          example:
            recordId: MC01-2026-1900002011
            tenantId: MERIDIAN-MC01
            status: COMMITTED
            createdAt: '2026-07-07T09:31:02Z'
    BadRequest:
      description: Request failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalidRequest:
              summary: INVALID_REQUEST
              value:
                error:
                  code: INVALID_REQUEST
                  httpStatus: 400
                  message: Request body fails JSON schema validation.
                  target: amountLC
                  correlationId: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                  retryable: false
            invalidDate:
              summary: INVALID_DATE_FORMAT
              value:
                error:
                  code: INVALID_DATE_FORMAT
                  httpStatus: 400
                  message: Date field does not conform to ISO 8601 (YYYY-MM-DD).
                  target: postingDate
                  correlationId: 7c9e6679-7425-40de-944b-e07fc1f90ae8
                  retryable: false
            invalidCurrency:
              summary: INVALID_CURRENCY_CODE
              value:
                error:
                  code: INVALID_CURRENCY_CODE
                  httpStatus: 400
                  message: Currency code is not valid ISO 4217 (3-letter).
                  target: currencyLC
                  correlationId: 7c9e6679-7425-40de-944b-e07fc1f90ae9
                  retryable: false
    Unauthorized:
      description: Authentication failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            tokenExpired:
              summary: TOKEN_EXPIRED
              value:
                error:
                  code: TOKEN_EXPIRED
                  httpStatus: 401
                  message: OAuth 2.0 access token has expired.
                  correlationId: 1b4e28ba-2fa1-11d2-883f-0016d3cca427
                  retryable: true
            invalidToken:
              summary: INVALID_TOKEN
              value:
                error:
                  code: INVALID_TOKEN
                  httpStatus: 401
                  message: Token is malformed, revoked, or from the wrong issuer.
                  correlationId: 1b4e28ba-2fa1-11d2-883f-0016d3cca428
                  retryable: false
    Forbidden:
      description: The token lacks the required scope or the tenant is locked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            insufficientScope:
              summary: INSUFFICIENT_SCOPE
              value:
                error:
                  code: INSUFFICIENT_SCOPE
                  httpStatus: 403
                  message: Token lacks required OAuth scope for this endpoint.
                  correlationId: 2c5f39cb-3ab2-42e3-994b-1127e4ddb538
                  retryable: false
            tenantLocked:
              summary: TENANT_LOCKED
              value:
                error:
                  code: TENANT_LOCKED
                  httpStatus: 403
                  message: Analytics tenant is locked (maintenance or billing issue).
                  correlationId: 2c5f39cb-3ab2-42e3-994b-1127e4ddb539
                  retryable: false
    NotFound:
      description: Referenced master data entity does not exist in target.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RESOURCE_NOT_FOUND
              httpStatus: 404
              message: Referenced master data entity does not exist in target.
              target: costCentre
              correlationId: 3d6a40dc-4bc3-43f4-aa5b-2238f5eec640
              retryable: false
    Conflict:
      description: Duplicate or concurrent modification.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            duplicate:
              summary: DUPLICATE_ENTRY
              value:
                error:
                  code: DUPLICATE_ENTRY
                  httpStatus: 409
                  message: Record with same business key already exists with a different payload.
                  target: documentId
                  correlationId: 4e7b51ed-5cd4-44a5-bb6c-3349a6ffd751
                  retryable: false
            concurrent:
              summary: CONCURRENT_MODIFICATION
              value:
                error:
                  code: CONCURRENT_MODIFICATION
                  httpStatus: 409
                  message: Another process is modifying the same resource.
                  correlationId: 4e7b51ed-5cd4-44a5-bb6c-3349a6ffd752
                  retryable: true
    UnprocessableEntity:
      description: Business rule or referential integrity violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            businessRule:
              summary: BUSINESS_RULE_VIOLATION
              value:
                error:
                  code: BUSINESS_RULE_VIOLATION
                  httpStatus: 422
                  message: Data violates analytics platform business rules.
                  target: amountLC
                  ruleName: DEBIT_CREDIT_BALANCE
                  correlationId: 5f8b62fe-6de5-45a6-cc7d-4450b7bce862
                  retryable: false
            referentialIntegrity:
              summary: REFERENTIAL_INTEGRITY
              value:
                error:
                  code: REFERENTIAL_INTEGRITY
                  httpStatus: 422
                  message: Referenced entity (cost centre, GL account) does not exist.
                  target: costCentre
                  correlationId: 5f8b62fe-6de5-45a6-cc7d-4450b7bce863
                  retryable: true
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
        X-RateLimit-Limit:
          $ref: '#/components/headers/XRateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/XRateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/XRateLimitReset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMITED
              httpStatus: 429
              message: Too many requests, rate limit exceeded.
              correlationId: 6a9b73bf-7ef6-46a7-dd8e-5561b8bcf973
              retryable: true
    InternalError:
      description: Unexpected platform error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INTERNAL_ERROR
              httpStatus: 500
              message: Unexpected platform error (server-side).
              correlationId: 7a0b84bc-8fa7-47a8-ee9f-6672b9bcd084
              retryable: true
    ServiceUnavailable:
      description: Platform under maintenance or overloaded.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: SERVICE_UNAVAILABLE
              httpStatus: 503
              message: Platform under maintenance or overloaded.
              correlationId: 8a1b95bc-9ba8-48a9-ff0a-7783b0bcd195
              retryable: true
    GatewayTimeout:
      description: Upstream service timeout.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: GATEWAY_TIMEOUT
              httpStatus: 504
              message: Upstream service timeout.
              correlationId: 9a2b06bc-0ba9-49a0-aa1b-8894b1bcd206
              retryable: true
  callbacks:
    LoadConfirmation:
      '{$request.header.X-Callback-Url}':
        post:
          operationId: loadConfirmationCallback
          summary: Asynchronous load-confirmation webhook
          description: >
            FinSight invokes the caller-supplied webhook once a previously
            accepted record has been durably committed or rejected in the
            analytical store.
          tags:
            - Journal Entries
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/LoadConfirmationEvent'
                example:
                  eventId: 9a1b2c3d-4e5f-6789-abcd-ef0123456789
                  recordId: MC01-2026-0100004821
                  resource: journal-entries
                  tenantId: MERIDIAN-MC01
                  status: COMMITTED
                  committedAt: '2026-07-07T09:30:15Z'
                  correlationId: 7c9e6679-7425-40de-944b-e07fc1f90ae7
          responses:
            '200':
              description: Webhook acknowledged by the receiver.
            '410':
              description: Webhook endpoint gone; FinSight will disable this callback URL.
  schemas:
    Error:
      type: object
      description: Shared FinSight error envelope.
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - httpStatus
            - message
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            httpStatus:
              type: integer
              description: Mirrored HTTP status code.
            message:
              type: string
              description: Human-readable error description.
            target:
              type: string
              description: Offending field, when applicable.
            ruleName:
              type: string
              description: Name of the violated business rule (422 BUSINESS_RULE_VIOLATION).
            correlationId:
              type: string
              format: uuid
              description: Correlation id for tracing across the integration pipeline.
            retryable:
              type: boolean
              description: Whether the caller may retry per the recommended-action policy.
    ErrorCode:
      type: string
      description: Canonical FinSight error code registry.
      enum:
        - INVALID_REQUEST
        - INVALID_DATE_FORMAT
        - INVALID_CURRENCY_CODE
        - TOKEN_EXPIRED
        - INVALID_TOKEN
        - INSUFFICIENT_SCOPE
        - TENANT_LOCKED
        - RESOURCE_NOT_FOUND
        - DUPLICATE_ENTRY
        - CONCURRENT_MODIFICATION
        - BUSINESS_RULE_VIOLATION
        - REFERENTIAL_INTEGRITY
        - RATE_LIMITED
        - INTERNAL_ERROR
        - SERVICE_UNAVAILABLE
        - GATEWAY_TIMEOUT
    RecordStatus:
      type: string
      description: Lifecycle status of a loaded record.
      enum:
        - ACCEPTED
        - COMMITTED
        - REJECTED
    RecordAck:
      type: object
      description: Generic acknowledgement returned by create operations.
      required:
        - recordId
        - tenantId
        - status
      properties:
        recordId:
          type: string
          description: Business key of the stored record.
        tenantId:
          type: string
          description: FinSight tenant the record belongs to.
        status:
          $ref: '#/components/schemas/RecordStatus'
        createdAt:
          type: string
          format: date-time
          description: Server timestamp when the record was accepted.
    LoadConfirmationEvent:
      type: object
      description: Asynchronous load-confirmation webhook payload.
      required:
        - eventId
        - recordId
        - resource
        - tenantId
        - status
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique event identifier.
        recordId:
          type: string
          description: Business key of the confirmed record.
        resource:
          type: string
          description: Resource path the record belongs to (for example journal-entries).
        tenantId:
          type: string
          description: FinSight tenant.
        status:
          $ref: '#/components/schemas/RecordStatus'
        committedAt:
          type: string
          format: date-time
          description: Timestamp of durable commit (present when status is COMMITTED).
        rejectionReason:
          type: string
          description: Reason the record was rejected (present when status is REJECTED).
        correlationId:
          type: string
          format: uuid
          description: Correlation id linking to the originating create request.
    ListMeta:
      type: object
      description: Shared cursor-pagination envelope.
      properties:
        pageSize:
          type: integer
          description: Number of records in this page.
        nextCursor:
          type: string
          nullable: true
          description: Cursor for the next page; null when the last page has been reached.
        totalEstimate:
          type: integer
          description: Approximate total number of records available.
