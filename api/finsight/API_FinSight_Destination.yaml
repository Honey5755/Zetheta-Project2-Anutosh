openapi: 3.0.3
info:
  title: Zetheta FinSight Destination Load API
  version: 2.0.0
  description: >
    Destination-load contract for the FDE-9B integration into Zetheta
    FinSight 4.2 (AWS Mumbai `ap-south-1`). This specification defines the
    twelve destination resources (DST-001 through DST-012) written by the
    FinSight Loader component after transformation of SAP S/4HANA source data.


    Every resource exposes a **POST** (create/upsert a record) and a **GET**
    (list records) operation under the versioned base path `/api/v2/`.


    ## Idempotency

    Each POST accepts an `Idempotency-Key` header carrying the transformed
    record business key (for General Ledger this is `documentId`). FinSight
    stores the key for 24 hours; a repeated POST with the same key and an
    identical payload returns the original result (HTTP 200) rather than
    creating a duplicate, while the same key with a divergent payload returns
    `409 DUPLICATE_ENTRY`. This makes the at-least-once delivery from Kafka
    safe.


    ## Authentication

    FinSight uses OAuth 2.0 with the `client_credentials` grant. The Loader
    exchanges its client id and secret at the token endpoint for a short-lived
    (3600s) bearer access token plus a refresh token. On `401 TOKEN_EXPIRED`
    the Loader silently refreshes using the `refresh_token` grant and replays
    the request; on `401 INVALID_TOKEN` it re-authenticates from scratch and
    raises a security alert. Tokens are scoped per resource (for example
    `finsight.journal-entries.write`).


    ## Tenancy and data residency

    Every request is tenant-scoped via the `X-FinSight-Tenant` header, one of
    `MERIDIAN-MC01`, `MERIDIAN-MC02`, `MERIDIAN-MC03`, matching the SAP company
    code routing. All processing and storage remain within `ap-south-1` per RBI
    data-residency requirements.


    ## Asynchronous load confirmation

    A POST is accepted synchronously (`201`) but the durable commit into the
    FinSight analytical store is confirmed asynchronously. Clients may register
    a webhook `callbackUrl`; FinSight then calls back with the final load
    outcome (COMMITTED or REJECTED) per record. See the callback definition on
    the create operations.


    ## Rate limiting

    Responses carry `X-RateLimit-Limit`, `X-RateLimit-Remaining` and
    `X-RateLimit-Reset`. On `429 RATE_LIMITED` clients must honour the
    `Retry-After` header and apply exponential backoff with jitter.
