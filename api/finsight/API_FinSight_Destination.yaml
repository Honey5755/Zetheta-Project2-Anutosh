    name: Zetheta FinSight Platform Engineering
    email: platform-eng@zetheta.example.com
  license:
    name: Proprietary - Zetheta Algorithms Private Limited
    url: https://zetheta.example.com/legal/api-terms
  termsOfService: https://zetheta.example.com/legal/api-terms
servers:
  - url: https://api.finsight.zetheta.example.com/api/v2
    description: FinSight production (AWS ap-south-1)
  - url: https://api.staging.finsight.zetheta.example.com/api/v2
    description: FinSight staging (AWS ap-south-1)
tags:
  - name: Journal Entries
    description: General Ledger journal entries (DST-001).
  - name: Payables
    description: Accounts Payable open items (DST-002).
  - name: Receivables
    description: Accounts Receivable open items (DST-003).
  - name: Cost Centres
    description: Cost centre master (DST-004).
  - name: Profit Centres
    description: Profit centre master (DST-005).
  - name: Material Ledger
    description: Material ledger valuation (DST-006).
  - name: Purchase Orders
    description: Purchase orders (DST-007).
  - name: Sales Orders
    description: Sales orders (DST-008).
  - name: Fixed Assets
    description: Fixed assets (DST-009).
  - name: Bank Statements
    description: Bank statements (DST-010).
  - name: Budget Actuals
    description: Budget versus actual totals (DST-011).
  - name: Inventory
    description: Inventory stock (DST-012).
security:
  - finsightOAuth2:
      - finsight.write
      - finsight.read
paths:
  /journal-entries:
    post:
      operationId: createJournalEntry
      summary: Create a journal entry (DST-001)
      description: >
        Upserts a transformed General Ledger journal entry into FinSight. The
        Idempotency-Key must carry the record `documentId`.
      tags:
        - Journal Entries
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/Tenant'
        - $ref: '#/components/parameters/CallbackUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryInput'
            example:
              documentId: MC01-2026-0100004821
              tenantId: MERIDIAN-MC01
              companyCode: MC01
              fiscalYear: 2026
              fiscalPeriod: 4
              calendarMonth: '2026-07'
              glAccount: '400000'
              glAccountName: Raw material consumption
              postingDate: '2026-07-07'
              amountLC: 152340.75
              currencyLC: INR
              debitCredit: DEBIT
              costCentre: MC01-IT
              profitCentre: PC-PL01
              sourceDocumentNumber: '0100004821'
      responses:
        '201':
          $ref: '#/components/responses/JournalEntryCreated'
        '200':
          $ref: '#/components/responses/JournalEntryIdempotentReplay'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      callbacks:
        loadConfirmation:
          $ref: '#/components/callbacks/LoadConfirmation'
    get:
      operationId: listJournalEntries
      summary: List journal entries (DST-001)
      description: Returns a cursor-paginated list of journal entries for the tenant.
      tags:
        - Journal Entries
      parameters:
        - $ref: '#/components/parameters/Tenant'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/FiscalYearQuery'
      responses:
        '200':
          description: Journal entry list page.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
